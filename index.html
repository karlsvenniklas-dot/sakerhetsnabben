<div id="root"></div>
<script>
// Lagrings-shim: härmar Claude-artifactens window.storage-API ovanpå localStorage.
// Samma nycklar som i artifact-versionen => backup-JSON kan flyttas fritt mellan dem.
window.storage = {
  async get(key) {
    const v = localStorage.getItem('sn:' + key);
    if (v === null) throw new Error('Nyckel saknas: ' + key);
    return { key, value: v, shared: false };
  },
  async set(key, value) {
    try {
      localStorage.setItem('sn:' + key, value);
      return { key, value, shared: false };
    } catch (e) {
      alert('Lagringen är full (webbläsarens localStorage-gräns). Ta en säkerhetskopia och radera gamla objekt/dokument.');
      throw e;
    }
  },
  async delete(key) {
    localStorage.removeItem('sn:' + key);
    return { key, deleted: true, shared: false };
  },
  async list(prefix = '') {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith('sn:') && k.slice(3).startsWith(prefix)) keys.push(k.slice(3));
    }
    return { keys, prefix, shared: false };
  },
};
</script>
